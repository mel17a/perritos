<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perritos - Carnet Digital</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="container">
    <section class="form-card">
      <h1>🐾 Crear carnet digital</h1>

      <form id="petForm">
        <h2>Datos del propietario</h2>
        <input id="ownerName" placeholder="Nombre propietario" required minlength="3">
        <input id="ownerRut" placeholder="RUT propietario" required pattern="^[0-9]{7,8}-[0-9kK]{1}$" title="Formato válido: 12345678-9">
        <input id="ownerAddress" placeholder="Dirección" required minlength="5">
        <input id="ownerCity" placeholder="Ciudad" required minlength="3">
        <input id="ownerPhone" placeholder="Teléfono" required pattern="^\+?[0-9]{8,12}$" title="Ingrese solo números, puede incluir +569">

        <h2>Datos de la mascota</h2>
        <label for="petPhoto">Cargar foto de perfil</label>
        <input id="petPhoto" type="file" accept="image/*">
        <input id="petName" placeholder="Nombre de mascota">
        <input id="petSex" placeholder="Sexo">
        <input id="petSpecies" placeholder="Especie">
        <input id="petColor" placeholder="Color">
        <input id="petBreed" placeholder="Raza">
        <input id="petTattoo" placeholder="Tatuaje">
        <input id="petAge" placeholder="Edad">
        <input id="petSizeWeight" placeholder="Tamaño / Peso">

        <h2>Vacunación</h2>
        <input id="vaccines" placeholder="Vacunas">
        <input id="lab" placeholder="Laboratorio fabricante">
        <input id="importer" placeholder="Importador">
        <label for="vaccinationDate">Fecha vacunación</label>
        <input id="vaccinationDate" type="date" required>
        <input id="serie" placeholder="Serie N°">
        <label for="nextVaccinationDate">Fecha próxima vacunación</label>
        <input id="nextVaccinationDate" type="date" required>
        
        <h2>Médico veterinario</h2>
        <input id="vetName" placeholder="Nombre médico veterinario">
        <input id="vetRun" placeholder="RUN N°">
        <input id="vetAddress" placeholder="Dirección">
        <input id="vetCity" placeholder="Ciudad">
        <input id="vetPhone" placeholder="Teléfono">

        <h2>Certificado</h2>
        <label for="certificatePhoto">Cargar certificado de vacunación</label>
        <input id="certificatePhoto" type="file" accept="image/*">

        <button type="submit">Generar carnet</button>
      </form>
    </section>

    <section class="card" id="carnet">
      <div class="pet-photo" id="petPhotoPreview">🐶</div>
      <h1 id="showPetName">Nombre mascota</h1>
      <p>Carnet digital de mascota</p>

      <div class="info" id="previewInfo"></div>

      <h2>Certificado de vacunación</h2>
      <img id="certificatePreview" class="certificate" alt="Certificado">

      <button onclick="exportPDF()">Exportar PDF</button>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
