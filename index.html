<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>Perritos - Carnet Digital</title>
  <link rel="stylesheet" href="styles.css?v=14">

<body class="theme-female">
  <main class="container">
    <section class="form-card">
      <div class="theme-buttons">
        <button type="button" onclick="setTheme('female')">Hembra</button>
        <button type="button" onclick="setTheme('male')">Macho</button>
        <button type="button" onclick="setTheme('fashion')">Moda NY</button>
      </div>

      <h1>🐾 Crear carnet digital</h1>

      <form id="petForm">
        <div class="form-section">
          <h2>Datos del propietario</h2>

          <input id="ownerName" placeholder="Nombre propietario" required minlength="3">
          <input id="ownerRut" placeholder="RUT propietario" required pattern="^[0-9]{7,8}-[0-9kK]{1}$" title="Formato válido: 12345678-9">

          <select id="ownerCountry" required>
            <option value="">Seleccione país</option>
            <option value="Chile">Chile</option>
            <option value="Argentina">Argentina</option>
            <option value="Perú">Perú</option>
            <option value="Bolivia">Bolivia</option>
            <option value="Colombia">Colombia</option>
            <option value="España">España</option>
            <option value="Otro">Otro</option>
          </select>

          <select id="ownerCity" required>
            <option value="">Seleccione ciudad / comuna</option>
          </select>

          <input id="ownerAddress" placeholder="Dirección" required minlength="5">
          <input id="ownerPhone" placeholder="Teléfono" required pattern="^\+?[0-9]{8,12}$" title="Ingrese solo números, puede incluir +569">
        </div>

        <div class="form-section">
          <h2>Datos de la mascota</h2>

          <label for="petPhoto">Cargar foto de perfil</label>
          <input id="petPhoto" type="file" accept="image/*">

          <input id="petName" placeholder="Nombre de mascota" required minlength="2">

          <select id="petSex" required>
            <option value="">Seleccione sexo</option>
            <option value="Hembra">Hembra</option>
            <option value="Macho">Macho</option>
          </select>

          <input id="petSpecies" placeholder="Especie">
          <input id="petColor" placeholder="Color">
          <input id="petBreed" placeholder="Raza">
          <input id="petTattoo" placeholder="Tatuaje">
          <input id="petMicrochip" placeholder="N° microchip">

          <label for="petMicrochipDate">Fecha microchip</label>
          <input id="petMicrochipDate" type="date">

          <input id="petAge" placeholder="Edad">
          <input id="petSizeWeight" placeholder="Tamaño / Peso">
        </div>

        <div class="form-section">
          <h2>Vacunación</h2>

          <div id="vaccinesContainer">
            <div class="vaccine-block">
              <input class="vaccines" placeholder="Vacuna">
              <input class="lab" placeholder="Laboratorio fabricante">
              <input class="importer" placeholder="Importador">

              <label>Fecha vacunación</label>
              <input class="vaccinationDate" type="date">

              <input class="serie" placeholder="Serie N°">

              <label>Fecha próxima vacunación</label>
              <input class="nextVaccinationDate" type="date">

              <label>Cargar certificado de vacunación</label>
              <input class="certificatePhoto" type="file" accept="image/*" capture="environment">

              <button type="button" class="remove-vaccine">Eliminar vacuna</button>
            </div>
          </div>

          <button type="button" id="addVaccineBtn">+ Agregar otra vacuna</button>
        </div>

        <div class="form-section">
          <h2>Médico veterinario</h2>

          <input id="vetName" placeholder="Nombre médico veterinario" required minlength="3">
          <input id="vetRun" placeholder="RUN N°" required pattern="^[0-9]{7,8}-[0-9kK]{1}$" title="Formato válido: 12345678-9">

          <select id="vetCountry" required>
            <option value="">Seleccione país</option>
            <option value="Chile">Chile</option>
            <option value="Argentina">Argentina</option>
            <option value="Perú">Perú</option>
            <option value="Bolivia">Bolivia</option>
            <option value="Colombia">Colombia</option>
            <option value="España">España</option>
            <option value="Otro">Otro</option>
          </select>

          <select id="vetCity" required>
            <option value="">Seleccione ciudad / comuna</option>
          </select>

          <input id="vetAddress" placeholder="Dirección" required minlength="5">
          <input id="vetPhone" placeholder="Teléfono" required pattern="^\+?[0-9]{8,12}$" title="Ingrese solo números, puede incluir +569">
        </div>

        <button type="submit">Generar carnet</button>
      </form>
    </section>

    <section class="card" id="carnet">
      <div class="pet-photo" id="petPhotoPreview">🐶</div>
      <h1 id="showPetName">Nombre mascota</h1>
      <p>Carnet digital de mascota</p>

      <div class="info" id="previewInfo"></div>

      <button type="button" onclick="exportPDF()">Exportar PDF</button>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="Chile-cities.js?v=14"></script>
  <script src="script.js?v=14"></script>
